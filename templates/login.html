<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - Bot Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#121212;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#1e1e1e;padding:30px;border-radius:12px;width:100%;max-width:360px}
.login-box h1{text-align:center;color:#1e90ff;margin-bottom:24px;font-size:22px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#888;margin-bottom:4px}
.form-group input{width:100%;padding:10px 12px;background:#2d2d2d;color:#fff;border:1px solid #3a3a3a;border-radius:8px;font-size:14px;outline:none}
.form-group input:focus{border-color:#1e90ff}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:#1e90ff;color:#fff}
.btn:active{opacity:0.7}
.error{background:#3a1a1a;color:#f27963;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div class="login-box">
<h1>Bot Panel</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
<div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
<div class="form-group"><label>Password</label><input type="password" name="password" required></div>
<button type="submit" class="btn">Login</button>
</form>
</div>
</body>
</html>
