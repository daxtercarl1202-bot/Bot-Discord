<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>{{ bot_name }} Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#121212;color:#fff;min-height:100vh;padding-bottom:20px}
.header{background:#1e1e1e;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;color:#1e90ff}
.header .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.header .status-dot.online{background:#4bc0a1}
.header .status-dot.offline{background:#f27963}
.tabs{display:flex;background:#1e1e1e;border-bottom:1px solid #2a2a2a;position:sticky;top:52px;z-index:10}
.tab-btn{flex:1;padding:12px;text-align:center;font-size:14px;color:#888;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab-btn.active{color:#1e90ff;border-bottom-color:#1e90ff}
.panel{display:none;padding:12px}
.panel.active{display:block}
.section-title{font-size:13px;color:#888;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}
select,input,textarea{width:100%;padding:10px 12px;margin-bottom:8px;background:#2d2d2d;color:#fff;border:1px solid #3a3a3a;border-radius:8px;font-size:14px;outline:none}
textarea{resize:vertical;min-height:80px;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#1e90ff}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.btn:active{opacity:0.7}
.btn-primary{background:#1e90ff;color:#fff}
.btn-purple{background:#9b59b6;color:#fff}
.btn:disabled{opacity:0.5}
.chat-box{background:#1a1a1a;border-radius:8px;padding:10px;height:200px;overflow-y:auto;font-size:13px;line-height:1.5;white-space:pre-wrap;font-family:'Courier New',monospace;color:#4af626;margin-bottom:8px}
.console{background:#0d0d0d;border-radius:8px;padding:10px;height:120px;overflow-y:auto;font-size:11px;font-family:'Courier New',monospace;color:#4af626;line-height:1.4;margin-top:8px}
.status-bar{text-align:center;padding:8px;font-size:12px;color:#888}
.status-bar.ok{color:#4bc0a1}
.status-bar.err{color:#f27963}
</style>
</head>
<body>
<div class="header">
    <h1>{{ bot_name }}</h1>
    <span><span class="status-dot offline" id="statusDot"></span></span>
</div>
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('channel',this)">Channel</button>
    <button class="tab-btn" onclick="switchTab('dm',this)">DM</button>
    <button class="tab-btn" onclick="switchTab('visitors',this)">Visitors</button>
</div>
<div class="panel active" id="channelPanel">
    <div class="section-title">Server</div>
    <select id="guildSelect" onchange="loadChannels()"><option>Loading...</option></select>
    <div class="section-title">Channel</div>
    <select id="channelSelect"><option>Loading...</option></select>
    <div class="section-title">Message</div>
    <textarea id="messageInput" placeholder="Type your message..."></textarea>
    <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Send Message</button>
    <button class="btn" style="background:#2d2d2d;margin-top:8px" onclick="loadGuilds()">Refresh Servers</button>
    <div class="section-title" style="margin-top:16px">Logs</div>
    <div class="console" id="console">Panel ready.</div>
</div>
<div class="panel" id="dmPanel">
    <div class="section-title">User ID</div>
    <input type="text" id="dmUserId" placeholder="Enter target User ID">
    <button class="btn" style="background:#2d2d2d" onclick="loadDMChat()">Load Chat</button>
    <div class="section-title" style="margin-top:12px">Chat History</div>
    <div class="chat-box" id="dmChat">Enter a User ID and tap Load Chat</div>
    <div class="section-title">Send Message</div>
    <textarea id="dmMessage" placeholder="Type your DM message..."></textarea>
    <button class="btn btn-purple" id="dmSendBtn" onclick="sendDM()">Send DM</button>
</div>
<div class="panel" id="visitorsPanel">
    <div class="section-title">Visitor Log</div>
    <div class="chat-box" id="visitorList" style="height:300px">Loading...</div>
    <button class="btn" style="background:#2d2d2d;margin-top:8px" onclick="loadVisitors()">Refresh Visitors</button>
</div>
<div class="status-bar" id="statusBar"></div>
<script>
let guilds=[],channels=[];
async function api(p,o={}){return await fetch(p,{headers:{'Content-Type':'application/json',...o.headers},...o}).then(r=>r.json())}
function log(m){const e=document.getElementById('console');const t=new Date().toTimeString().slice(0,8);e.innerHTML=`[${t}] ${m}\n`+e.innerHTML}
function setStatus(t,ok){document.getElementById('statusBar').textContent=t;document.getElementById('statusBar').className='status-bar '+(ok?'ok':'err');document.getElementById('statusDot').className='status-dot '+(ok?'online':'offline')}
function switchTab(n,b){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(n+'Panel').classList.add('active')}
async function loadGuilds(){const s=document.getElementById('guildSelect');s.innerHTML='<option>Loading...</option>';const d=await api('/api/guilds');if(d.error){log('Error: '+d.error);return}guilds=d;s.innerHTML=guilds.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');log('Loaded '+guilds.length+' servers');loadChannels()}
async function loadChannels(){const s=document.getElementById('channelSelect');const g=document.getElementById('guildSelect').value;if(!g)return;s.innerHTML='<option>Loading...</option>';const d=await api('/api/channels/'+g);if(d.error){log('Error: '+d.error);return}channels=d;s.innerHTML=channels.map(c=>`<option value="${c.id}">${c.type==='text'?'# ':''}${c.name}</option>`).join('');log('Loaded '+channels.length+' channels')}
async function sendMessage(){const c=document.getElementById('channelSelect').value;const m=document.getElementById('messageInput').value.trim();if(!c){alert('Select a channel!');return}if(!m){alert('Empty message!');return}const b=document.getElementById('sendBtn');b.disabled=true;b.textContent='Sending...';const r=await api('/api/send',{method:'POST',body:JSON.stringify({channel_id:c,content:m})});b.disabled=false;b.textContent='Send Message';if(r.ok){document.getElementById('messageInput').value='';log('Message sent!')}else{log('Failed: '+(r.error||'unknown'))}}
async function loadDMChat(){const u=document.getElementById('dmUserId').value.trim();if(!u){alert('Enter a User ID!');return}const e=document.getElementById('dmChat');e.textContent='Loading...';const d=await api('/api/dm/chat/'+u);if(d.error){e.textContent='Error: '+d.error;return}if(d.length===0){e.textContent='(empty chat)';return}e.textContent=d.map(m=>`[${m.timestamp}] ${m.author}: ${m.content}`).join('\n')}
async function sendDM(){const u=document.getElementById('dmUserId').value.trim();const m=document.getElementById('dmMessage').value.trim();if(!u){alert('Enter a User ID!');return}if(!m){alert('Empty message!');return}const b=document.getElementById('dmSendBtn');b.disabled=true;b.textContent='Sending...';const r=await api('/api/dm/send',{method:'POST',body:JSON.stringify({user_id:u,content:m})});b.disabled=false;b.textContent='Send DM';if(r.ok){document.getElementById('dmMessage').value='';log('DM sent!');loadDMChat()}else{log('Failed: '+(r.error||'unknown'))}}
async function loadVisitors(){const e=document.getElementById('visitorList');const d=await api('/api/visitors');e.innerHTML=d.length?d.map(v=>`[${v.time}] ${v.ip} | ${v.device} | ${v.browser}`).join('\n'):'No visitors yet.'}
(async()=>{const st=await api('/api/status');if(st.ok){setStatus(st.bot+' - '+st.guilds+' servers',true);loadGuilds()}else{setStatus(st.message||'Error',false)};loadVisitors()})();
</script>
</body>
</html>
